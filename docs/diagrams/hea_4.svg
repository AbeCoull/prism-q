<style>:root{--bg:#ffffff;--wire:#c4c8cc;--text:#2b2f33;--stripe:#f6f7f8;--ctrl-dot:#2b2f33;--ctrl-bdr:#ffffff;--swap:#6b7075;--barrier:#dcdfe2;--shadow-filter:drop-shadow(0 0.5px 0.5px rgba(0,0,0,0.05));--hover-filter:drop-shadow(0 0 3px #5a5e6350);--std-top:#dce8f6;--std-fill:#c8daf0;--std-str:#3872a8;--std-txt:#1e4d7a;--par-top:#e6d8f4;--par-fill:#d8c8ee;--par-str:#6840a0;--par-txt:#42267a;--pha-top:#d4eedf;--pha-fill:#c0e4d0;--pha-str:#2d7a52;--pha-txt:#1a5438;--ctrl-top:#f2e4cc;--ctrl-fill:#ecd8b8;--ctrl-str:#98682e;--ctrl-txt:#6a4418;--meas-top:#f2d8da;--meas-fill:#eac8ca;--meas-str:#a03840;--meas-txt:#701820;--mfus-top:#ddd4f0;--mfus-fill:#d0c4e8;--mfus-str:#5c40a0;--mfus-txt:#3a2070;}@media(prefers-color-scheme:dark){:root{--bg:#000000;--wire:#2a2d31;--text:#b0b4ba;--stripe:#07080a;--ctrl-dot:#d0d3d8;--ctrl-bdr:#000000;--swap:#6b7075;--barrier:#2a2d31;--shadow-filter:drop-shadow(0 0.5px 0.5px rgba(0,0,0,0.30));--hover-filter:drop-shadow(0 0 3px #7a7e8450);--std-top:#1a3858;--std-fill:#122844;--std-str:#5a9ed6;--std-txt:#90c4ec;--par-top:#2e1e50;--par-fill:#20123a;--par-str:#9868d0;--par-txt:#c4a0ec;--pha-top:#183c28;--pha-fill:#0e2818;--pha-str:#40b878;--pha-txt:#80e0b0;--ctrl-top:#382c14;--ctrl-fill:#281c08;--ctrl-str:#d09848;--ctrl-txt:#ecc888;--meas-top:#381c22;--meas-fill:#281014;--meas-str:#c85060;--meas-txt:#ec9098;--mfus-top:#261c44;--mfus-fill:#1a1030;--mfus-str:#8860c8;--mfus-txt:#b898e8;}}text{font-family:Inter,-apple-system,system-ui,sans-serif;font-size:11px;text-rendering:optimizeLegibility;font-variant-numeric:tabular-nums;}.gate text{font-family:'JetBrains Mono','Fira Code',Consolas,monospace;font-weight:600;letter-spacing:-0.01em;}.gate{filter:var(--shadow-filter);cursor:pointer;transition:filter 0.15s ease,opacity 0.1s ease;}.gate:hover{filter:var(--hover-filter);opacity:0.92;}.ctrl{cursor:pointer;transition:r 0.1s ease;}.ctrl:hover circle{r:4.5;}.gate-std rect,.gate-std circle{fill:url(#g-std);stroke:var(--std-str);}.gate-std text{fill:var(