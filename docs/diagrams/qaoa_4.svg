<g class="gate gate-par"><title>Rzz(6.2588) on q[0], q[1]</title><rect x="48.0" y="23.0" width="91.0" height="22.0" rx="1" stroke-width="1"/><text x="93.5" y="34.0" text-anchor="middle" dominant-baseline="central" font-size="11.0px">Rzz(6.2588)</text></g>
