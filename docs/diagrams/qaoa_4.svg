<line x1="184.5" y1="62.0" x2="184.5" y2="90.0" stroke="var(--par-str)" stroke-width="1" shape-rendering="crispEdges"/>
<g class="gate gate-par"><title>Rzz(3.6428) on q[1], q[2]</title><rect x="139.0" y="51.0" width="91.0" height="22.0" rx="1" stroke-width="1"/><text x="184.5" y="62.0" text-anchor="middle" dominant-baseline="central" font-size="11.0px">Rzz(3.6428)</text></g>
<g class="gate gate-par"><title>Rzz(3.6428) on q[1], q[2]</title><rect x="139.0" y="79.0" width="91.0" height="22.0" rx="1" stroke-width="1"/><text x="184.5" y="90.0" text-anchor="middle" dominant-baseline="central" font-size="11.0px">Rzz(3.6428)</text></g>
<g class="gate gate-par"><title>Rx(1.5839) on q[0]</title><rect x="142.4" y="23.0" width="84.2" height="22.0" rx="1" stroke-width="1"/><text x="184.5" y="34.0" text-anchor="middle" dominant-baseline="central">Rx(1.5839)</text></g>
<line x1="275.5" y1="90.0" x2="275.5" y2="118.0" stroke="var(--par-str)" stroke-width="1" shape-rendering="crispEdges"/>
<g class="gate gate-par"><title>Rzz(0.0368) on q[2], q[3]</title><rect x="230.0" y="79.0" width="91.0" height="22.0" rx="1" stroke-width="1"/><text x="275.5" y="90.0" text-anchor="middle" dominant-baseline="central" font-size="11.0px">Rzz(0.0368)</text></g>
<g class="gate gate-par"><title>Rzz(0.0368) on q[2], q[3]</title><rect x="230.0" y="107.0" width="91.0" height="22.0" rx="1" stroke-width="1"/><text x="275.5" y="118.0" text-anchor="middle" dominant-baseline="central" font-size="11.0px">Rzz(0.0368)</text></g>
<g class="gate gate-par"><title>Rx(4.2522) on q[1]</title><rect x="233.4" y="51.0" width="84.2" height="22.0" rx="1" stroke-width="1"/><text x="275.5" y="62.0" text-anchor="middle" dominant-baseline="central">Rx(4.2522)</text></g>
<g class="gate gate-par"><title>Rx(0.1932) on q[2]</title><rect x="321.1" y="79.0" width="84.2" height="22.0" rx="1" stroke-width="1"/><text x="363.2" y="90.0" text-anchor="middle" dominant-baseline="central">Rx(0.1932)</text></g>
<g class="gate gate-par"><title>Rx(5.5949) on q[3]</title><rect x="321.1" y="107.0" width="84.2" height="22.0" rx="1" stroke-width="1"/><text x="363.2" y="118.0" text-anchor="middle" dominant-baseline="central">Rx(5.5949)</text></g>
</g>
